<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Data Recovery Tool v4</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'SF Mono', 'Fira Code', monospace; max-width: 1000px; margin: 40px auto; padding: 0 20px; background: #0f0f1a; color: #e0e0e0; }
    h1 { color: #00d4ff; margin-bottom: 5px; }
    .version { color: #666; font-size: 13px; margin-bottom: 20px; }
    .section { margin: 16px 0; padding: 15px; background: #16213e; border-radius: 8px; }
    label { display: block; margin: 8px 0 4px; color: #00d4ff; font-weight: bold; font-size: 13px; }
    input[type="file"] { margin: 4px 0; font-size: 13px; }
    button { padding: 12px 24px; margin: 10px 5px; font-size: 15px; cursor: pointer; border: none; border-radius: 6px; font-family: monospace; font-weight: bold; }
    .btn-dry { background: #f39c12; color: #000; }
    .btn-live { background: #e74c3c; color: #fff; }
    .btn-dry:hover { background: #e67e22; }
    .btn-live:hover { background: #c0392b; }
    .btn-dry:disabled, .btn-live:disabled { opacity: 0.5; cursor: not-allowed; }

    .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 12px 0; }
    .summary-card { padding: 12px; border-radius: 6px; text-align: center; }
    .summary-card .count { font-size: 28px; font-weight: bold; }
    .summary-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
    .card-safe { background: #1a3a2a; color: #2ecc71; border: 1px solid #2ecc7140; }
    .card-manual { background: #3a3a1a; color: #f39c12; border: 1px solid #f39c1240; }
    .card-archived { background: #2a2a2a; color: #888; border: 1px solid #88888840; }
    .card-blocker { background: #3a1a1a; color: #e74c3c; border: 1px solid #e74c3c40; }
    .card-delete { background: #2a1a1a; color: #e74c3c; border: 1px solid #e74c3c40; }
    .card-insert { background: #1a2a3a; color: #3498db; border: 1px solid #3498db40; }

    .group-header { font-size: 14px; font-weight: bold; margin: 16px 0 8px; padding: 8px 12px; border-radius: 4px; }
    .group-safe { background: #1a3a2a; color: #2ecc71; }
    .group-manual { background: #3a3a1a; color: #f39c12; }
    .group-archived { background: #2a2a2a; color: #888; }
    .group-blocker { background: #3a1a1a; color: #e74c3c; }
    .group-execute { background: #1a2a3a; color: #3498db; }
    .group-balance { background: #2a1a3a; color: #a78bfa; }

    .student-row { font-size: 12px; padding: 6px 12px; border-bottom: 1px solid #ffffff10; display: grid; grid-template-columns: 30px 120px 100px 200px 80px 60px 60px 70px 1fr; gap: 8px; align-items: center; }
    .student-row:hover { background: #ffffff08; }
    .manual-row { font-size: 12px; padding: 6px 12px; border-bottom: 1px solid #ffffff10; }
    .archived-row { font-size: 12px; padding: 6px 12px; border-bottom: 1px solid #ffffff10; color: #666; }
    .tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: bold; }
    .tag-safe { background: #2ecc7130; color: #2ecc71; }
    .tag-manual { background: #f39c1230; color: #f39c12; }
    .tag-skip { background: #88888830; color: #888; }
    .tag-blocker { background: #e74c3c30; color: #e74c3c; }
    .tag-reason { background: #3498db20; color: #3498db; font-size: 10px; }
    .tag-source-json { background: #2ecc7125; color: #2ecc71; font-size: 9px; padding: 1px 5px; border-radius: 3px; }
    .tag-source-db { background: #3498db25; color: #3498db; font-size: 9px; padding: 1px 5px; border-radius: 3px; }

    #output { display: none; }
    #loading { display: none; color: #00d4ff; padding: 20px; text-align: center; font-size: 16px; }
    .execute-row { font-size: 12px; padding: 4px 12px; border-bottom: 1px solid #ffffff10; }
  </style>
</head>
<body>
  <h1>🔧 Data Recovery Tool</h1>
  <div class="version">v4 — SAFE_APPLY / MANUAL_REVIEW / SKIP_ARCHIVED architecture</div>

  <div class="section">
    <label>1. restore_student_lesson_tracking.json</label>
    <input type="file" id="file-tracking" accept=".json">
    <label>2. restore_student_lessons.json</label>
    <input type="file" id="file-lessons" accept=".json">
    <label>3. restore_teacher_balance.json</label>
    <input type="file" id="file-balance" accept=".json">
  </div>

  <div class="section">
    <button class="btn-dry" id="btn-dry" onclick="run(true)">🔍 DRY RUN</button>
    <button class="btn-live" id="btn-live" onclick="run(false)">🚀 LIVE RUN (sadece SAFE_APPLY)</button>
  </div>

  <div id="loading">⏳ Edge function çağrılıyor...</div>
  <div id="output"></div>

  <script>
    const SUPABASE_URL = 'https://hwwpbtcgppzuscbvjkde.supabase.co';
    const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh3d3BidGNncHB6dXNjYnZqa2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ2MDg3ODMsImV4cCI6MjA3MDE4NDc4M30.JGRXEpY7HI4CfRJnKqlYLCDovBbZUzkEp8Jx0Jr2NYw';

    async function readFile(inputId) {
      const input = document.getElementById(inputId);
      if (!input.files || !input.files[0]) throw new Error(`${inputId}: dosya seçilmedi`);
      return JSON.parse(await input.files[0].text());
    }

    async function run(dryRun) {
      const output = document.getElementById('output');
      const loading = document.getElementById('loading');
      output.style.display = 'none';
      loading.style.display = 'block';

      document.getElementById('btn-dry').disabled = true;
      document.getElementById('btn-live').disabled = true;

      try {
        const tracking = await readFile('file-tracking');
        const lessons = await readFile('file-lessons');
        const balance = await readFile('file-balance');

        const resp = await fetch(`${SUPABASE_URL}/functions/v1/data-recovery`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${ANON_KEY}`,
          },
          body: JSON.stringify({ dry_run: dryRun, tracking, lessons, balance }),
        });

        const result = await resp.json();

        if (result.error) {
          loading.style.display = 'none';
          output.style.display = 'block';
          output.innerHTML = `<div class="section" style="color:#e74c3c">❌ ERROR: ${esc(result.error)}</div>`;
          return;
        }

        loading.style.display = 'none';
        output.style.display = 'block';
        renderResult(result, dryRun);
      } catch (err) {
        loading.style.display = 'none';
        output.style.display = 'block';
        output.innerHTML = `<div class="section" style="color:#e74c3c">❌ ${esc(err.message)}</div>`;
      } finally {
        document.getElementById('btn-dry').disabled = false;
        document.getElementById('btn-live').disabled = false;
      }
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function renderResult(r, dryRun) {
      const s = r.summary || {};
      let html = '';

      // Mode banner
      html += `<div class="section" style="text-align:center; font-size:16px; font-weight:bold; color:${dryRun ? '#f39c12' : '#e74c3c'}">
        ${dryRun ? '🔍 DRY RUN — hiçbir değişiklik yapılmadı' : '🚀 LIVE RUN — SAFE_APPLY grubu işlendi'}
      </div>`;

      // Summary cards
      html += `<div class="summary-grid">
        <div class="summary-card card-safe"><div class="count">${s.safeCount || 0}</div><div class="label">Safe Apply</div></div>
        <div class="summary-card card-manual"><div class="count">${s.manualCount || 0}</div><div class="label">Manual Review</div></div>
        <div class="summary-card card-archived"><div class="count">${s.archivedCount || 0}</div><div class="label">Archived (Skip)</div></div>
        <div class="summary-card card-blocker"><div class="count">${s.blockerCount || 0}</div><div class="label">Hard Blocker</div></div>
        <div class="summary-card card-delete"><div class="count">${dryRun ? s.safeDeleteEstimate : s.totalDeleted}</div><div class="label">${dryRun ? 'Delete Est.' : 'Deleted'}</div></div>
        <div class="summary-card card-insert"><div class="count">${dryRun ? s.safeInsertEstimate : s.totalInserted}</div><div class="label">${dryRun ? 'Insert Est.' : 'Inserted'}</div></div>
      </div>`;

      // SAFE_APPLY
      if (r.safeApply && r.safeApply.length > 0) {
        html += `<div class="group-header group-safe">✅ SAFE_APPLY (${r.safeApply.length})</div>`;
        html += `<div class="section" style="padding:0; overflow-x:auto;">`;
        html += `<div class="student-row" style="font-weight:bold; color:#888; font-size:11px; border-bottom:1px solid #ffffff20;">
          <div>#</div><div>Öğrenci</div><div>Öğretmen</div><div>UUID</div><div>Tamamlanan</div><div>Slot</div><div>LPW</div><div>İşlem</div>
        </div>`;
        r.safeApply.forEach((s, i) => {
          html += `<div class="student-row">
            <div>${i + 1}</div>
            <div style="color:#2ecc71; font-weight:bold">${esc(s.student_name)}</div>
            <div>${esc(s.teacher_name)}</div>
            <div style="font-size:10px; color:#666">${s.student_id.substring(0, 8)}...</div>
            <div><span style="color:#2ecc71; font-weight:bold">${s.completed_count}</span>/${s.total_lessons}</div>
            <div>${s.template_slot_count}</div>
            <div>${s.resolved_lpw}</div>
            <div style="font-size:10px">DEL ${s.current_delete_count} → INS ${s.insert_count}</div>
          </div>`;
        });
        html += `</div>`;
      }

      // MANUAL_REVIEW
      if (r.manualReview && r.manualReview.length > 0) {
        html += `<div class="group-header group-manual">⚠️ MANUAL_REVIEW (${r.manualReview.length})</div>`;
        html += `<div class="section" style="padding:8px;">`;
        r.manualReview.forEach(s => {
          html += `<div class="manual-row">
            <span class="tag tag-manual">MANUAL</span>
            <strong style="color:#f39c12; margin:0 8px;">${esc(s.student_name)}</strong>
            <span style="color:#888">(${esc(s.teacher_name)})</span>
            <span style="color:#555; font-size:10px; margin-left:8px;">${s.student_id.substring(0, 8)}...</span>
            <span class="tag tag-reason" style="margin-left:8px;">${esc(s.reason_code)}</span>
            <div style="margin-left:24px; color:#888; font-size:11px; margin-top:2px;">${esc(s.reason_detail)}</div>
          </div>`;
        });
        html += `</div>`;
      }

      // SKIP_ARCHIVED
      if (r.skippedArchived && r.skippedArchived.length > 0) {
        html += `<div class="group-header group-archived">⏭️ SKIP_ARCHIVED (${r.skippedArchived.length})</div>`;
        html += `<div class="section" style="padding:8px;">`;
        r.skippedArchived.forEach(s => {
          html += `<div class="archived-row">
            <span class="tag tag-skip">SKIP</span>
            <span style="margin-left:8px;">${esc(s.student_name)}</span>
            <span style="color:#555; margin-left:8px;">(${esc(s.teacher_name)})</span>
          </div>`;
        });
        html += `</div>`;
      }

      // HARD_BLOCKER
      if (r.hardBlocker && r.hardBlocker.length > 0) {
        html += `<div class="group-header group-blocker">🛑 HARD_BLOCKER (${r.hardBlocker.length})</div>`;
        html += `<div class="section" style="padding:8px;">`;
        r.hardBlocker.forEach(s => {
          html += `<div class="manual-row">
            <span class="tag tag-blocker">BLOCKER</span>
            <strong style="color:#e74c3c; margin:0 8px;">${esc(s.student_name)}</strong>
            <span class="tag tag-reason" style="margin-left:8px;">${esc(s.reason_code)}</span>
            <div style="margin-left:24px; color:#888; font-size:11px; margin-top:2px;">${esc(s.reason_detail)}</div>
          </div>`;
        });
        html += `</div>`;
      }

      // Balance dry run
      if (r.balanceDryRun && r.balanceDryRun.length > 0) {
        html += `<div class="group-header group-balance">💰 BALANCE RESTORE (${r.balanceDryRun.length} teachers)</div>`;
        html += `<div class="section" style="padding:8px;">`;
        r.balanceDryRun.forEach(b => {
          html += `<div class="manual-row">
            <strong style="color:#a78bfa">${esc(b.teacher_name)}</strong>
            <span style="margin-left:12px;">total=${b.restore_total}min, regular=${b.restore_regular}, trial=${b.restore_trial}</span>
          </div>`;
        });
        html += `</div>`;
      }

      // Execute log (LIVE only)
      if (!dryRun && r.executeLog && r.executeLog.length > 0) {
        html += `<div class="group-header group-execute">📋 EXECUTION LOG</div>`;
        html += `<div class="section" style="padding:8px;">`;
        r.executeLog.forEach(line => {
          html += `<div class="execute-row">${esc(line)}</div>`;
        });
        html += `</div>`;
      }

      document.getElementById('output').innerHTML = html;
    }
  </script>
</body>
</html>
